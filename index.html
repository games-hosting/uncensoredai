<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>gayi — gay ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ── RESET & BASE ──────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --surface:   #13161e;
    --border:    #1e2230;
    --accent:    #c8a96e;
    --accent2:   #7ec8c8;
    --text:      #e8e4d9;
    --muted:     #636878;
    --user-bg:   #1a1d28;
    --ai-bg:     #13161e;
    --radius:    14px;
    --font-serif: 'DM Serif Display', Georgia, serif;
    --font-sans:  'DM Sans', sans-serif;
    --font-mono:  'DM Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NOISE GRAIN OVERLAY ───────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── LAYOUT ────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 760px;
    margin: 0 auto;
    position: relative;
  }

  /* ── HEADER ────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 22px 28px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    animation: fadeDown 0.5s ease both;
  }

  .logo-mark {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: conic-gradient(from 200deg, var(--accent), var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif);
    font-size: 18px;
    color: #0d0f14;
    font-weight: 900;
    flex-shrink: 0;
    box-shadow: 0 0 18px rgba(200,169,110,0.25);
  }

  .header-info h1 {
    font-family: var(--font-serif);
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: 0.01em;
    color: var(--text);
  }
  .header-info p {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ade80;
    margin-left: auto;
    box-shadow: 0 0 8px #4ade80;
    animation: pulse 2.5s ease-in-out infinite;
  }

  /* ── MESSAGES AREA ─────────────────────────────── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 28px 8px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* ── WELCOME ───────────────────────────────────── */
  .welcome {
    text-align: center;
    padding: 48px 16px;
    animation: fadeUp 0.6s ease both;
  }
  .welcome .big-letter {
    font-family: var(--font-serif);
    font-size: clamp(3rem, 12vw, 5rem);
    font-style: italic;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 12px;
  }
  .welcome p {
    color: var(--muted);
    font-size: 0.9rem;
    max-width: 320px;
    margin: 0 auto;
  }

  /* ── MESSAGE BUBBLES ───────────────────────────── */
  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease both;
  }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    margin-top: 2px;
  }
  .msg.ai .avatar {
    background: conic-gradient(from 200deg, var(--accent), var(--accent2));
    color: #0d0f14;
    font-family: var(--font-serif);
  }
  .msg.user .avatar {
    background: var(--border);
    color: var(--muted);
  }

  .bubble {
    max-width: min(72%, 560px);
    padding: 13px 17px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    font-size: 0.9rem;
    line-height: 1.7;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border-color: #252838;
    border-bottom-right-radius: 4px;
  }
  .msg.ai .bubble {
    background: var(--ai-bg);
    border-bottom-left-radius: 4px;
  }

  /* Inline code */
  .bubble code {
    font-family: var(--font-mono);
    font-size: 0.82em;
    background: rgba(200,169,110,0.1);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* Code blocks */
  .bubble pre {
    background: #0a0c11;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 10px 0;
    position: relative;
  }
  .bubble pre code {
    background: none;
    color: #a8c7fa;
    padding: 0;
    font-size: 0.83em;
    display: block;
  }

  /* Lists */
  .bubble ul, .bubble ol {
    padding-left: 20px;
    margin: 6px 0;
  }
  .bubble li { margin: 4px 0; }

  /* Bold/em */
  .bubble strong { color: var(--accent); font-weight: 600; }
  .bubble em { color: var(--accent2); }

  .bubble p + p { margin-top: 8px; }

  /* ── TYPING INDICATOR ──────────────────────────── */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 16px 17px;
  }
  .typing-indicator span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: blink 1.2s ease-in-out infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  /* ── INPUT BAR ─────────────────────────────────── */
  #input-area {
    padding: 16px 28px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    animation: fadeUp 0.5s 0.15s ease both;
  }

  #config-bar { display: none; }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 0.9rem;
    resize: none;
    outline: none;
    max-height: 180px;
    min-height: 48px;
    transition: border-color 0.2s;
    line-height: 1.55;
  }
  #user-input::placeholder { color: var(--muted); }
  #user-input:focus { border-color: var(--accent); }

  #send-btn {
    width: 46px; height: 46px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #0d0f14;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.15s;
  }
  #send-btn:hover:not(:disabled) { opacity: 0.88; transform: scale(1.04); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #send-btn svg { width: 18px; height: 18px; }

  .hint {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.03em;
  }

  /* ── ANIMATIONS ────────────────────────────────── */
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
  @keyframes blink    { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }
  @keyframes pulse    { 0%,100% { box-shadow: 0 0 8px #4ade80; } 50% { box-shadow: 0 0 16px #4ade80; } }

  /* ── RESPONSIVE ────────────────────────────────── */
  @media (max-width: 600px) {
    header { padding: 16px 18px; }
    #messages { padding: 20px 16px 8px; }
    #input-area { padding: 12px 16px 20px; }
    .bubble { max-width: 85%; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo-mark">g</div>
    <div class="header-info">
      <h1>gayi</h1>
      <p>powered by slaves in my basement</p>
    </div>
    <div class="status-dot" title="Online"></div>
  </header>

  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="big-letter">gayi</div>
      <p>kinda gay lmao</p>
    </div>
  </div>

  <div id="input-area">
    <div id="config-bar">
      <label for="worker-url">⚙ Worker URL</label>
      <input type="url" id="worker-url" placeholder="https://your-worker.your-subdomain.workers.dev" spellcheck="false" />
    </div>
    <div class="input-row">
      <textarea id="user-input" rows="1" placeholder="Message gayi…" autofocus></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="hint">Enter to send · Shift+Enter for new line</p>
  </div>

</div>

<script>
// ── STATE ──────────────────────────────────────────────
const history = [];

// ── ELEMENTS ───────────────────────────────────────────
const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('user-input');
const sendBtn     = document.getElementById('send-btn');
const workerUrlEl = document.getElementById('worker-url');
const welcomeEl   = document.getElementById('welcome');

// ── HARDCODED WORKER URL ───────────────────────────────
workerUrlEl.value = 'https://uncensoredai.theodor-rozitis.workers.dev';

// ── AUTO-RESIZE TEXTAREA ───────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
});

// ── SEND ON ENTER ──────────────────────────────────────
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click', sendMessage);

// ── MARKDOWN-LITE RENDERER ─────────────────────────────
function renderMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<strong>$1</strong>')
    .replace(/^## (.+)$/gm, '<strong>$1</strong>')
    .replace(/^# (.+)$/gm, '<strong>$1</strong>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br/>');

  return `<p>${html}</p>`;
}

// ── APPEND MESSAGE ─────────────────────────────────────
function appendMessage(role, content) {
  if (welcomeEl) welcomeEl.remove();

  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'ai' ? 'g' : 'U';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'ai') {
    bubble.innerHTML = renderMarkdown(content);
  } else {
    bubble.textContent = content;
  }

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollToBottom();
  return bubble;
}

// ── TYPING INDICATOR ───────────────────────────────────
function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.id = 'typing';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'g';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `
    <div class="typing-indicator">
      <span></span><span></span><span></span>
    </div>`;

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollToBottom();
}
function hideTyping() {
  document.getElementById('typing')?.remove();
}

// ── SCROLL ─────────────────────────────────────────────
function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── MAIN SEND ──────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  const workerUrl = workerUrlEl.value.trim();
  if (!workerUrl) {
    alert('Please enter your Cloudflare Worker URL above.');
    workerUrlEl.focus();
    return;
  }

  history.push({ role: 'user', content: text });
  appendMessage('user', text);

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  inputEl.disabled = true;

  showTyping();

  try {
    const res = await fetch(workerUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });

    hideTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const reply = data?.choices?.[0]?.message?.content ?? '(empty response)';

    history.push({ role: 'assistant', content: reply });
    appendMessage('ai', reply);

  } catch (err) {
    hideTyping();
    appendMessage('ai', `⚠️ Error: ${err.message}\n\nCheck that your Worker URL is correct and the Worker is deployed.`);
  } finally {
    sendBtn.disabled = false;
    inputEl.disabled = false;
    inputEl.focus();
  }
}
</script>
</body>
</html>
